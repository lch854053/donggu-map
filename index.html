<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>광주 동구 고유가 지원금 사용처 지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #faf6ef;
    --accent: #e8590c;
    --accent-soft: #fff0e6;
    --line: #e2dccf;
    --panel: #ffffff;
    --shadow: 0 4px 24px rgba(60,40,20,0.12);
    /* 업종별 색상 14종 */
    --c0:#e8590c; --c1:#1971c2; --c2:#2f9e44; --c3:#9c36b5;
    --c4:#0c8599; --c5:#e8a000; --c6:#d6336c; --c7:#5f3dc4;
    --c8:#c92a2a; --c9:#495057; --c10:#1098ad; --c11:#868e96;
    --c12:#7048e8; --c13:#f08c00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--ink);
    background: var(--paper);
    -webkit-tap-highlight-color: transparent;
  }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* 헤더 */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 12px 18px;
    display: flex; align-items: baseline; gap: 12px;
    z-index: 30;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px; letter-spacing: 0.5px;
    font-weight: 400;
  }
  header h1 .hl { color: var(--accent); }
  header .sub { font-size: 12px; opacity: 0.7; }
  header .header-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  header .count { font-size: 12px; opacity: 0.85; white-space: nowrap; }
  header .contact { font-size: 11px; opacity: 0.7; white-space: nowrap; color: inherit; text-decoration: none; }
  header .contact:hover { opacity: 1; text-decoration: underline; }

  /* 본체 레이아웃 */
  #body { flex: 1; display: flex; position: relative; min-height: 0; }

  /* 사이드 패널 */
  #panel {
    width: 320px; background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    z-index: 20; transition: transform 0.3s ease;
  }
  .search-box { padding: 14px; border-bottom: 1px solid var(--line); }
  .search-box input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--line); border-radius: 10px;
    font-family: inherit; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }

  .filters { padding: 12px 14px; border-bottom: 1px solid var(--line); }
  .filters-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .filters-head .title { font-size: 12px; font-weight: bold; color: #888; letter-spacing: 0.5px; }
  .filters-head button {
    font-family: inherit; font-size: 11px; border: none; background: none;
    color: var(--accent); cursor: pointer; padding: 2px 4px;
  }
  .cat-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .cat-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 16px; cursor: pointer;
    font-size: 12px; border: 1.5px solid var(--line);
    background: white; transition: all 0.15s; user-select: none;
  }
  .cat-chip .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .cat-chip.off { opacity: 0.35; }
  .cat-chip.off .name { text-decoration: line-through; }
  .cat-chip .cnt { color: #aaa; font-size: 11px; }

  /* 리스트 */
  .list-wrap { flex: 1; overflow-y: auto; }
  .list-head {
    padding: 10px 14px 6px; font-size: 12px; color: #888;
    position: sticky; top: 0; background: var(--panel); z-index: 1;
  }
  .list-item {
    padding: 10px 14px; border-bottom: 1px solid #f2eee5;
    cursor: pointer; transition: background 0.12s;
  }
  .list-item:hover { background: var(--accent-soft); }
  .list-item .name { font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
  .list-item .name .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .list-item .meta { font-size: 12px; color: #999; margin-top: 2px; margin-left: 14px; }
  .list-more {
    padding: 12px; text-align: center; font-size: 13px;
    color: var(--accent); cursor: pointer;
  }
  .list-empty { padding: 30px 14px; text-align: center; color: #bbb; font-size: 13px; }

  /* 지도 */
  #map-wrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; background: #e8e8e8; }

  /* 내 위치 버튼 */
  .map-btn {
    position: absolute; right: 12px; z-index: 10;
    width: 44px; height: 44px; border-radius: 12px;
    background: white; border: none; box-shadow: var(--shadow);
    cursor: pointer; font-size: 20px; display: flex;
    align-items: center; justify-content: center;
  }
  #locBtn { bottom: 24px; }
  #panelToggle {
    display: none; top: 12px; left: 12px;
    width: auto; padding: 0 14px; height: 40px; gap: 6px;
    font-family: inherit; font-size: 13px; font-weight: bold;
  }

  /* 정보 오버레이 */
  .info-card {
    background: white; border-radius: 12px; padding: 0;
    box-shadow: var(--shadow); min-width: 200px; max-width: 260px;
    overflow: hidden; font-family: 'Gowun Dodum', sans-serif;
  }
  .info-card .ic-top { padding: 12px 14px 10px; }
  .info-card .ic-cat {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: white;
    padding: 3px 9px 3px 4px; border-radius: 12px; margin-bottom: 6px;
  }
  .info-card .ic-name { font-size: 15px; font-weight: bold; line-height: 1.3; }
  .info-card .ic-addr { font-size: 12px; color: #888; margin-top: 4px; line-height: 1.4; }
  .info-card .ic-actions { display: flex; border-top: 1px solid var(--line); }
  .info-card .ic-actions a {
    flex: 1; text-align: center; padding: 9px; font-size: 12px;
    color: var(--accent); text-decoration: none; font-weight: bold;
  }
  .info-card .ic-actions a + a { border-left: 1px solid var(--line); }
  .info-close {
    position: absolute; top: 6px; right: 8px; cursor: pointer;
    font-size: 16px; color: #bbb; background: none; border: none; z-index: 2;
  }

  /* 로딩 */
  #loading {
    position: absolute; inset: 0; background: var(--paper);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50; gap: 14px;
  }
  #loading .spin {
    width: 40px; height: 40px; border: 4px solid var(--line);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .txt { font-size: 14px; color: #999; }

  /* 모바일 */
  @media (max-width: 760px) {
    #body { flex-direction: column; }
    /* 패널을 하단 시트로 */
    #panel {
      position: absolute; left: 0; right: 0; bottom: 0; top: auto;
      width: 100%; height: 45vh; max-height: 80vh;
      border-right: none; border-top: 1px solid var(--line);
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -4px 24px rgba(60,40,20,0.18);
      transition: transform 0.3s ease;
    }
    /* 손잡이 */
    #panel::before {
      content: ''; position: absolute; top: 8px; left: 50%;
      transform: translateX(-50%);
      width: 40px; height: 4px; border-radius: 2px;
      background: #d8d2c5;
    }
    #sheetHandle {
      display: block; height: 22px; flex-shrink: 0; cursor: grab;
    }
    /* 접힌 상태: 검색창 높이만 남기고 내려감 */
    #panel.collapsed { transform: translateY(calc(45vh - 96px)); }
    .search-box { padding: 10px 14px; }
    #map-wrap { flex: 1; height: 55vh; }
    #panelToggle { display: none; }   /* 하단 시트에선 토글 버튼 불필요 */
    #locBtn { bottom: calc(45vh + 16px); transition: bottom 0.3s ease; }
    body.sheet-collapsed #locBtn { bottom: 112px; }
    header h1 { font-size: 15px; }
    header .sub { display: none; }
    header .contact { font-size: 10px; }
    header .count { font-size: 11px; }
    .cat-chip { font-size: 13px; padding: 6px 11px; }
    .list-item { padding: 12px 14px; }
    .list-item .name { font-size: 15px; }
  }
  #sheetHandle { display: none; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>광주 <span class="hl">동구</span> 사용처 지도</h1>
    <span class="sub">고유가 지원금 가맹점</span>
    <span class="header-right">
      <span class="count" id="countLabel">불러오는 중…</span>
      <a class="contact" href="mailto:ch4834@korea.kr">오류 및 누락 문의 : ch4834@korea.kr</a>
    </span>
  </header>
  <div id="body">
    <aside id="panel">
      <div id="sheetHandle"></div>
      <div class="search-box">
        <input type="text" id="search" placeholder="🔍 가맹점 이름 검색" autocomplete="off">
      </div>
      <div class="filters">
        <div class="filters-head">
          <span class="title">업종 필터</span>
          <span>
            <button id="allOn">전체</button>
            <button id="allOff">해제</button>
          </span>
        </div>
        <div class="cat-grid" id="catGrid"></div>
      </div>
      <div class="list-wrap">
        <div class="list-head" id="listHead"></div>
        <div id="list"></div>
      </div>
    </aside>
    <div id="map-wrap">
      <button class="map-btn" id="panelToggle">☰ 목록</button>
      <button class="map-btn" id="locBtn" title="내 위치">📍</button>
      <div id="map"></div>
    </div>
  </div>
</div>
<div id="loading"><div class="spin"></div><div class="txt">지도를 불러오는 중…</div></div>

<!-- 데이터 -->
<script src="shops.js"></script>
<!-- 카카오맵 SDK는 아래 스크립트에서 동적으로 로드합니다 -->
<script>
const CATS = window.__SHOPS__.cats;
const DATA = window.__SHOPS__.data;
const CAT_COLORS = ['#e8590c','#1971c2','#2f9e44','#9c36b5','#0c8599','#e8a000','#d6336c','#5f3dc4','#c92a2a','#495057','#1098ad','#868e96','#7048e8','#f08c00'];
const catIndex = {};
CATS.forEach((c,i)=>catIndex[c]=i);
function colorOf(cat){ return CAT_COLORS[catIndex[cat] % CAT_COLORS.length]; }
// 작은 원형 아이콘 배지 (목록/필터/정보창용)
function iconBadge(cat, size){
  size = size || 18;
  const color = colorOf(cat);
  const icon = (typeof CAT_ICONS !== 'undefined' && CAT_ICONS[cat]) || '<circle cx="8" cy="8" r="3" fill="#fff"/>';
  return `<span style="display:inline-flex;width:${size}px;height:${size}px;border-radius:50%;background:${color};align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="${size-4}" height="${size-4}" viewBox="0 0 16 16">${icon}</svg></span>`;
}

let map, clusterer, infoOverlay;
let activeCats = new Set(CATS);
let searchTerm = '';
let markerByRef = new Map();   // shop -> marker
let listLimit = 50;

const KAKAO_JS_KEY = 'b31f8087d96176cdca15a25f8180faf6';

(function loadKakaoSDK(){
  const loadingTxt = document.querySelector('#loading .txt');
  const s = document.createElement('script');
  s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + KAKAO_JS_KEY + '&libraries=clusterer&autoload=false';
  s.onload = function(){
    if (window.kakao && kakao.maps && kakao.maps.load) {
      kakao.maps.load(initMap);
    } else {
      if(loadingTxt) loadingTxt.textContent = '지도 SDK 초기화에 실패했습니다.';
    }
  };
  s.onerror = function(){
    if(loadingTxt) loadingTxt.innerHTML =
      '지도를 불러오지 못했습니다.<br>카카오 JavaScript 키와 도메인 등록을 확인해주세요.';
  };
  document.head.appendChild(s);
})();

function initMap(){
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(35.1466, 126.9220), // 광주 동구 중심
    level: 5
  });
  map.setMaxLevel(9);

  clusterer = new kakao.maps.MarkerClusterer({
    map: map,
    averageCenter: true,
    minLevel: 4,
    disableClickZoom: false,
    styles: makeClusterStyles()
  });

  buildMarkers();
  buildFilters();
  applyFilter();
  bindUI();

  document.getElementById('loading').style.display = 'none';
}

function makeClusterStyles(){
  const base = (size, font, bg) => ({
    width: size+'px', height: size+'px',
    background: bg,
    borderRadius: (size/2)+'px',
    color: '#fff', textAlign: 'center',
    lineHeight: size+'px', fontSize: font+'px',
    fontWeight: 'bold',
    boxShadow: '0 2px 8px rgba(0,0,0,0.25)',
    border: '2px solid rgba(255,255,255,0.8)'
  });
  return [
    base(36,13,'rgba(232,89,12,0.85)'),
    base(46,14,'rgba(217,72,15,0.88)'),
    base(58,16,'rgba(193,42,42,0.9)')
  ];
}

let allMarkers = [];
function buildMarkers(){
  DATA.forEach(shop => {
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(shop.la, shop.lo),
      image: pinImage(shop.c),
      title: shop.n
    });
    kakao.maps.event.addListener(marker, 'click', ()=>openInfo(shop, marker));
    shop._marker = marker;
    markerByRef.set(shop, marker);
    allMarkers.push(marker);
  });
}

// 업종별 아이콘 (16x16 viewBox 기준 SVG path, 흰색으로 그려짐)
const CAT_ICONS = {
  '음식점':        '<path d="M3 1v5a2 2 0 0 0 2 2v7h1V1h-.6v4.5H5V1h-.6v4.5h-.8V1H3zm8 0c-1.2 0-2 1.6-2 3.6 0 1.6.7 2.9 1.5 3.3V15h1V1h-.5z" fill="#fff"/>',
  '의류/잡화':     '<path d="M6 1L3 3l1 2 1-.6V15h6V4.4l1 .6 1-2-3-2c0 1.1-.9 2-2 2s-2-.9-2-2z" fill="#fff"/>',
  '용역서비스':    '<path d="M11.5 2.5a2.5 2.5 0 0 0-3.3 3.1L3 10.8 5.2 13l5.2-5.2a2.5 2.5 0 0 0 3.1-3.3l-1.6 1.6-1.4-.3-.3-1.4 1.3-1.5z" fill="#fff"/>',
  '마트/쇼핑':     '<path d="M3 3h1.5l.4 2M5 5l1 6h6l1.5-5H5zm1.5 8a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm5 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z" fill="#fff"/>',
  '레포츠/문화/취미': '<circle cx="8" cy="8" r="6.2" fill="none" stroke="#fff" stroke-width="1.5"/><path d="M3 4.5C5 7 5 9 3 11.5M13 4.5C11 7 11 9 13 11.5" fill="none" stroke="#fff" stroke-width="1.2"/>',
  '제과/커피':     '<path d="M3 4h8v4a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V4zm8 1h1.5a1.5 1.5 0 0 1 0 3H11M3 13h9" stroke="#fff" stroke-width="1.2" fill="none"/>',
  '뷰티':          '<path d="M8 1.5l1.6 3.3 3.6.5-2.6 2.5.6 3.6L8 9.7l-3.2 1.7.6-3.6L2.8 5.3l3.6-.5z" fill="#fff"/>',
  '학원/교육':     '<path d="M8 2.5L1.5 5.5 8 8.5l6.5-3zM4.5 7.5v3c0 .9 1.6 1.7 3.5 1.7s3.5-.8 3.5-1.7v-3M13.5 6v3.5" stroke="#fff" stroke-width="1.2" fill="none" stroke-linejoin="round"/>',
  '의료':          '<path d="M6.5 2h3v4.5H14v3H9.5V14h-3V9.5H2v-3h4.5z" fill="#fff"/>',
  '생활':          '<path d="M8 1L2 6v8h4v-4h4v4h4V6z" fill="#fff"/>',
  '전자/사무기기': '<rect x="2.5" y="3" width="11" height="7" rx="1" fill="none" stroke="#fff" stroke-width="1.3"/><path d="M6 13h4M8 10v3" stroke="#fff" stroke-width="1.2"/>',
  '기타':          '<circle cx="4" cy="8" r="1.4" fill="#fff"/><circle cx="8" cy="8" r="1.4" fill="#fff"/><circle cx="12" cy="8" r="1.4" fill="#fff"/>',
  '자동차/주유/정비': '<path d="M3 9l1-3.5C4.2 4.6 4.8 4 5.6 4h4.8c.8 0 1.4.6 1.6 1.5L13 9v3h-1.5v-1.5h-7V12H3zm2 0h6l-.6-2.5H5.6z" fill="#fff"/>',
  '숙박':          '<path d="M2 5v8h1.5v-2h9v2H14V8c0-1.1-.9-2-2-2H7v3H3.5V5zm2 1.5a1.2 1.2 0 1 0 0 2.4 1.2 1.2 0 0 0 0-2.4z" fill="#fff"/>'
};

// 업종별 SVG 핀 (캐시)
const pinCache = {};
function pinImage(cat){
  if(pinCache[cat]) return pinCache[cat];
  const color = colorOf(cat);
  const icon = CAT_ICONS[cat] || '<circle cx="8" cy="8" r="3" fill="#fff"/>';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 32 42">
    <path d="M16 0C7.2 0 0 7.2 0 16c0 11.3 16 26 16 26s16-14.7 16-26C32 7.2 24.8 0 16 0z" fill="${color}"/>
    <circle cx="16" cy="16" r="11" fill="rgba(255,255,255,0.18)"/>
    <g transform="translate(8,8)">${icon}</g></svg>`;
  const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  const img = new kakao.maps.MarkerImage(url, new kakao.maps.Size(32,42), {offset:new kakao.maps.Point(16,42)});
  pinCache[cat] = img;
  return img;
}


function openInfo(shop, marker){
  if(infoOverlay) infoOverlay.setMap(null);
  const color = colorOf(shop.c);
  const enc = encodeURIComponent(shop.n);
  const kakaoLink = `https://map.kakao.com/link/search/${enc}`;
  const kakaoNav = `https://map.kakao.com/link/to/${enc},${shop.la},${shop.lo}`;
  const html = document.createElement('div');
  html.className = 'info-card';
  html.innerHTML = `
    <button class="info-close">×</button>
    <div class="ic-top">
      <span class="ic-cat" style="background:${color}"><svg width="13" height="13" viewBox="0 0 16 16" style="margin-right:1px">${(CAT_ICONS[shop.c]||'<circle cx="8" cy="8" r="3" fill="#fff"/>')}</svg>${shop.c}</span>
      <div class="ic-name">${escapeHtml(shop.n)}</div>
      <div class="ic-addr">${escapeHtml(shop.a)}</div>
    </div>
    <div class="ic-actions">
      <a href="${kakaoLink}" target="_blank" rel="noopener">카카오맵에서 보기</a>
      <a href="${kakaoNav}" target="_blank" rel="noopener">길찾기</a>
    </div>`;
  infoOverlay = new kakao.maps.CustomOverlay({
    content: html,
    position: marker.getPosition(),
    yAnchor: 1.35,
    zIndex: 100
  });
  html.querySelector('.info-close').onclick = ()=>infoOverlay.setMap(null);
  infoOverlay.setMap(map);
  map.panTo(marker.getPosition());
}

function buildFilters(){
  const counts = {};
  DATA.forEach(s=>counts[s.c]=(counts[s.c]||0)+1);
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATS.map(c=>`
    <div class="cat-chip" data-cat="${escapeAttr(c)}">
      ${iconBadge(c, 16)}
      <span class="name">${escapeHtml(c)}</span>
      <span class="cnt">${counts[c]||0}</span>
    </div>`).join('');
  grid.querySelectorAll('.cat-chip').forEach(chip=>{
    chip.onclick = ()=>{
      const c = chip.dataset.cat;
      if(activeCats.has(c)){ activeCats.delete(c); chip.classList.add('off'); }
      else { activeCats.add(c); chip.classList.remove('off'); }
      applyFilter();
    };
  });
}

function applyFilter(){
  const term = searchTerm.trim().toLowerCase();
  const visibleMarkers = [];
  const visibleShops = [];
  DATA.forEach(shop=>{
    const ok = activeCats.has(shop.c) &&
      (term === '' || shop.n.toLowerCase().includes(term));
    if(ok){ visibleMarkers.push(shop._marker); visibleShops.push(shop); }
  });
  clusterer.clear();
  clusterer.addMarkers(visibleMarkers);
  document.getElementById('countLabel').textContent =
    `${visibleShops.length.toLocaleString()} / ${DATA.length.toLocaleString()}곳`;
  renderList(visibleShops);
}

function renderList(shops){
  const head = document.getElementById('listHead');
  const list = document.getElementById('list');
  head.textContent = `사용처 ${shops.length.toLocaleString()}곳`;
  if(shops.length === 0){
    list.innerHTML = '<div class="list-empty">조건에 맞는 사용처가 없습니다.</div>';
    return;
  }
  const shown = shops.slice(0, listLimit);
  list.innerHTML = shown.map((s,i)=>`
    <div class="list-item" data-i="${i}">
      <div class="name">${iconBadge(s.c, 18)}${escapeHtml(s.n)}</div>
      <div class="meta">${escapeHtml(s.c)} · ${escapeHtml(s.a)}</div>
    </div>`).join('') +
    (shops.length > listLimit ? `<div class="list-more" id="loadMore">+ ${shops.length-listLimit}곳 더 보기</div>` : '');
  list.querySelectorAll('.list-item').forEach(el=>{
    el.onclick = ()=>{
      const s = shown[+el.dataset.i];
      map.setLevel(3);
      map.panTo(new kakao.maps.LatLng(s.la, s.lo));
      openInfo(s, s._marker);
      if(window.innerWidth <= 760) collapseSheet(true);
    };
  });
  const more = document.getElementById('loadMore');
  if(more) more.onclick = ()=>{ listLimit += 50; renderList(shops); };
}

function bindUI(){
  let t;
  document.getElementById('search').addEventListener('input', e=>{
    clearTimeout(t);
    t = setTimeout(()=>{ searchTerm = e.target.value; listLimit = 50; applyFilter(); }, 200);
  });
  document.getElementById('allOn').onclick = ()=>{
    activeCats = new Set(CATS);
    document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('off'));
    applyFilter();
  };
  document.getElementById('allOff').onclick = ()=>{
    activeCats = new Set();
    document.querySelectorAll('.cat-chip').forEach(c=>c.classList.add('off'));
    applyFilter();
  };
  document.getElementById('locBtn').onclick = locateMe;
  setupSheet();
}

// 하단 시트 (모바일) 제어
function collapseSheet(collapse){
  const panel = document.getElementById('panel');
  if(collapse){ panel.classList.add('collapsed'); document.body.classList.add('sheet-collapsed'); }
  else { panel.classList.remove('collapsed'); document.body.classList.remove('sheet-collapsed'); }
}
function setupSheet(){
  const handle = document.getElementById('sheetHandle');
  const panel = document.getElementById('panel');
  if(!handle) return;

  // 탭으로 토글
  let dragStartY = null, moved = false;
  const onDown = (y)=>{ dragStartY = y; moved = false; };
  const onMove = (y)=>{
    if(dragStartY === null) return;
    if(Math.abs(y - dragStartY) > 8) moved = true;
  };
  const onUp = (y)=>{
    if(dragStartY === null) return;
    if(moved){
      // 위로 끌면 펼치기, 아래로 끌면 접기
      if(y < dragStartY) collapseSheet(false);
      else collapseSheet(true);
    } else {
      // 탭: 토글
      collapseSheet(!panel.classList.contains('collapsed'));
    }
    dragStartY = null;
  };

  handle.addEventListener('touchstart', e=>onDown(e.touches[0].clientY), {passive:true});
  handle.addEventListener('touchmove', e=>onMove(e.touches[0].clientY), {passive:true});
  handle.addEventListener('touchend', e=>onUp(e.changedTouches[0].clientY));
  handle.addEventListener('mousedown', e=>onDown(e.clientY));
  window.addEventListener('mousemove', e=>onMove(e.clientY));
  window.addEventListener('mouseup', e=>{ if(dragStartY!==null) onUp(e.clientY); });

  // 검색창 포커스하면 자동으로 펼치기
  document.getElementById('search').addEventListener('focus', ()=>collapseSheet(false));
}

let myMarker;
function locateMe(){
  if(!navigator.geolocation){ alert('위치 기능을 지원하지 않는 브라우저입니다.'); return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const loc = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
    if(myMarker) myMarker.setMap(null);
    const dot = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="7" fill="#1971c2" stroke="white" stroke-width="3"/></svg>`;
    const url = 'data:image/svg+xml;base64,'+btoa(dot);
    myMarker = new kakao.maps.Marker({
      position: loc, map: map,
      image: new kakao.maps.MarkerImage(url, new kakao.maps.Size(22,22), {offset:new kakao.maps.Point(11,11)})
    });
    map.setLevel(4);
    map.panTo(loc);
  }, ()=>alert('위치를 가져올 수 없습니다. 위치 권한을 확인해주세요.'), {enableHighAccuracy:true, timeout:8000});
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
</script>
