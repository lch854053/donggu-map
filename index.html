<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>광주 동구 고유가 지원금 사용처 지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #faf6ef;
    --accent: #e8590c;
    --accent-soft: #fff0e6;
    --line: #e2dccf;
    --panel: #ffffff;
    --shadow: 0 4px 24px rgba(60,40,20,0.12);
    /* 업종별 색상 14종 */
    --c0:#e8590c; --c1:#1971c2; --c2:#2f9e44; --c3:#9c36b5;
    --c4:#0c8599; --c5:#e8a000; --c6:#d6336c; --c7:#5f3dc4;
    --c8:#c92a2a; --c9:#495057; --c10:#1098ad; --c11:#868e96;
    --c12:#7048e8; --c13:#f08c00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--ink);
    background: var(--paper);
    -webkit-tap-highlight-color: transparent;
  }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* 헤더 */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 12px 18px;
    display: flex; align-items: baseline; gap: 12px;
    z-index: 30;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px; letter-spacing: 0.5px;
    font-weight: 400;
  }
  header h1 .hl { color: var(--accent); }
  header .sub { font-size: 12px; opacity: 0.7; }
  header .count { margin-left: auto; font-size: 12px; opacity: 0.85; white-space: nowrap; }

  /* 본체 레이아웃 */
  #body { flex: 1; display: flex; position: relative; min-height: 0; }

  /* 사이드 패널 */
  #panel {
    width: 320px; background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    z-index: 20; transition: transform 0.3s ease;
  }
  .search-box { padding: 14px; border-bottom: 1px solid var(--line); }
  .search-box input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--line); border-radius: 10px;
    font-family: inherit; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }

  .filters { padding: 12px 14px; border-bottom: 1px solid var(--line); }
  .filters-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .filters-head .title { font-size: 12px; font-weight: bold; color: #888; letter-spacing: 0.5px; }
  .filters-head button {
    font-family: inherit; font-size: 11px; border: none; background: none;
    color: var(--accent); cursor: pointer; padding: 2px 4px;
  }
  .cat-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .cat-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 16px; cursor: pointer;
    font-size: 12px; border: 1.5px solid var(--line);
    background: white; transition: all 0.15s; user-select: none;
  }
  .cat-chip .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .cat-chip.off { opacity: 0.35; }
  .cat-chip.off .name { text-decoration: line-through; }
  .cat-chip .cnt { color: #aaa; font-size: 11px; }

  /* 리스트 */
  .list-wrap { flex: 1; overflow-y: auto; }
  .list-head {
    padding: 10px 14px 6px; font-size: 12px; color: #888;
    position: sticky; top: 0; background: var(--panel); z-index: 1;
  }
  .list-item {
    padding: 10px 14px; border-bottom: 1px solid #f2eee5;
    cursor: pointer; transition: background 0.12s;
  }
  .list-item:hover { background: var(--accent-soft); }
  .list-item .name { font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
  .list-item .name .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .list-item .meta { font-size: 12px; color: #999; margin-top: 2px; margin-left: 14px; }
  .list-more {
    padding: 12px; text-align: center; font-size: 13px;
    color: var(--accent); cursor: pointer;
  }
  .list-empty { padding: 30px 14px; text-align: center; color: #bbb; font-size: 13px; }

  /* 지도 */
  #map-wrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; background: #e8e8e8; }

  /* 내 위치 버튼 */
  .map-btn {
    position: absolute; right: 12px; z-index: 10;
    width: 44px; height: 44px; border-radius: 12px;
    background: white; border: none; box-shadow: var(--shadow);
    cursor: pointer; font-size: 20px; display: flex;
    align-items: center; justify-content: center;
  }
  #locBtn { bottom: 24px; }
  #panelToggle {
    display: none; top: 12px; left: 12px;
    width: auto; padding: 0 14px; height: 40px; gap: 6px;
    font-family: inherit; font-size: 13px; font-weight: bold;
  }

  /* 정보 오버레이 */
  .info-card {
    background: white; border-radius: 12px; padding: 0;
    box-shadow: var(--shadow); min-width: 200px; max-width: 260px;
    overflow: hidden; font-family: 'Gowun Dodum', sans-serif;
  }
  .info-card .ic-top { padding: 12px 14px 10px; }
  .info-card .ic-cat {
    display: inline-block; font-size: 11px; color: white;
    padding: 2px 8px; border-radius: 10px; margin-bottom: 6px;
  }
  .info-card .ic-name { font-size: 15px; font-weight: bold; line-height: 1.3; }
  .info-card .ic-addr { font-size: 12px; color: #888; margin-top: 4px; line-height: 1.4; }
  .info-card .ic-actions { display: flex; border-top: 1px solid var(--line); }
  .info-card .ic-actions a {
    flex: 1; text-align: center; padding: 9px; font-size: 12px;
    color: var(--accent); text-decoration: none; font-weight: bold;
  }
  .info-card .ic-actions a + a { border-left: 1px solid var(--line); }
  .info-close {
    position: absolute; top: 6px; right: 8px; cursor: pointer;
    font-size: 16px; color: #bbb; background: none; border: none; z-index: 2;
  }

  /* 로딩 */
  #loading {
    position: absolute; inset: 0; background: var(--paper);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50; gap: 14px;
  }
  #loading .spin {
    width: 40px; height: 40px; border: 4px solid var(--line);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .txt { font-size: 14px; color: #999; }

  /* 모바일 */
  @media (max-width: 760px) {
    #panel {
      position: absolute; inset: 0 auto 0 0; height: 100%;
      box-shadow: var(--shadow);
    }
    #panel.hidden { transform: translateX(-100%); }
    #panelToggle { display: flex; }
    header h1 { font-size: 16px; }
    header .sub { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>광주 <span class="hl">동구</span> 사용처 지도</h1>
    <span class="sub">고유가 지원금 가맹점</span>
    <span class="count" id="countLabel">불러오는 중…</span>
  </header>
  <div id="body">
    <aside id="panel">
      <div class="search-box">
        <input type="text" id="search" placeholder="🔍 가맹점 이름 검색" autocomplete="off">
      </div>
      <div class="filters">
        <div class="filters-head">
          <span class="title">업종 필터</span>
          <span>
            <button id="allOn">전체</button>
            <button id="allOff">해제</button>
          </span>
        </div>
        <div class="cat-grid" id="catGrid"></div>
      </div>
      <div class="list-wrap">
        <div class="list-head" id="listHead"></div>
        <div id="list"></div>
      </div>
    </aside>
    <div id="map-wrap">
      <button class="map-btn" id="panelToggle">☰ 목록</button>
      <button class="map-btn" id="locBtn" title="내 위치">📍</button>
      <div id="map"></div>
    </div>
  </div>
</div>
<div id="loading"><div class="spin"></div><div class="txt">지도를 불러오는 중…</div></div>

<!-- 데이터 -->
<script src="shops.js"></script>
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b31f8087d96176cdca15a25f8180faf6&libraries=clusterer&autoload=false"></script>
<script>
const CATS = window.__SHOPS__.cats;
const DATA = window.__SHOPS__.data;
const CAT_COLORS = ['#e8590c','#1971c2','#2f9e44','#9c36b5','#0c8599','#e8a000','#d6336c','#5f3dc4','#c92a2a','#495057','#1098ad','#868e96','#7048e8','#f08c00'];
const catIndex = {};
CATS.forEach((c,i)=>catIndex[c]=i);
function colorOf(cat){ return CAT_COLORS[catIndex[cat] % CAT_COLORS.length]; }

let map, clusterer, infoOverlay;
let activeCats = new Set(CATS);
let searchTerm = '';
let markerByRef = new Map();   // shop -> marker
let listLimit = 50;

kakao.maps.load(function(){
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(35.1466, 126.9220), // 광주 동구 중심
    level: 5
  });
  map.setMaxLevel(9);

  clusterer = new kakao.maps.MarkerClusterer({
    map: map,
    averageCenter: true,
    minLevel: 4,
    disableClickZoom: false,
    styles: makeClusterStyles()
  });

  buildMarkers();
  buildFilters();
  applyFilter();
  bindUI();

  document.getElementById('loading').style.display = 'none';
});

function makeClusterStyles(){
  const base = (size, font, bg) => ({
    width: size+'px', height: size+'px',
    background: bg,
    borderRadius: (size/2)+'px',
    color: '#fff', textAlign: 'center',
    lineHeight: size+'px', fontSize: font+'px',
    fontWeight: 'bold',
    boxShadow: '0 2px 8px rgba(0,0,0,0.25)',
    border: '2px solid rgba(255,255,255,0.8)'
  });
  return [
    base(36,13,'rgba(232,89,12,0.85)'),
    base(46,14,'rgba(217,72,15,0.88)'),
    base(58,16,'rgba(193,42,42,0.9)')
  ];
}

let allMarkers = [];
function buildMarkers(){
  DATA.forEach(shop => {
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(shop.la, shop.lo),
      image: pinImage(colorOf(shop.c)),
      title: shop.n
    });
    kakao.maps.event.addListener(marker, 'click', ()=>openInfo(shop, marker));
    shop._marker = marker;
    markerByRef.set(shop, marker);
    allMarkers.push(marker);
  });
}

// 색상별 SVG 핀 (캐시)
const pinCache = {};
function pinImage(color){
  if(pinCache[color]) return pinCache[color];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
    <path d="M13 0C5.8 0 0 5.8 0 13c0 9.2 13 21 13 21s13-11.8 13-21C26 5.8 20.2 0 13 0z" fill="${color}"/>
    <circle cx="13" cy="13" r="5" fill="white"/></svg>`;
  const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  const img = new kakao.maps.MarkerImage(url, new kakao.maps.Size(26,34), {offset:new kakao.maps.Point(13,34)});
  pinCache[color] = img;
  return img;
}

function openInfo(shop, marker){
  if(infoOverlay) infoOverlay.setMap(null);
  const color = colorOf(shop.c);
  const enc = encodeURIComponent(shop.n);
  const kakaoLink = `https://map.kakao.com/link/search/${enc}`;
  const kakaoNav = `https://map.kakao.com/link/to/${enc},${shop.la},${shop.lo}`;
  const html = document.createElement('div');
  html.className = 'info-card';
  html.innerHTML = `
    <button class="info-close">×</button>
    <div class="ic-top">
      <span class="ic-cat" style="background:${color}">${shop.c}</span>
      <div class="ic-name">${escapeHtml(shop.n)}</div>
      <div class="ic-addr">${escapeHtml(shop.a)}</div>
    </div>
    <div class="ic-actions">
      <a href="${kakaoLink}" target="_blank" rel="noopener">카카오맵에서 보기</a>
      <a href="${kakaoNav}" target="_blank" rel="noopener">길찾기</a>
    </div>`;
  infoOverlay = new kakao.maps.CustomOverlay({
    content: html,
    position: marker.getPosition(),
    yAnchor: 1.35,
    zIndex: 100
  });
  html.querySelector('.info-close').onclick = ()=>infoOverlay.setMap(null);
  infoOverlay.setMap(map);
  map.panTo(marker.getPosition());
}

function buildFilters(){
  const counts = {};
  DATA.forEach(s=>counts[s.c]=(counts[s.c]||0)+1);
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATS.map(c=>`
    <div class="cat-chip" data-cat="${escapeAttr(c)}">
      <span class="dot" style="background:${colorOf(c)}"></span>
      <span class="name">${escapeHtml(c)}</span>
      <span class="cnt">${counts[c]||0}</span>
    </div>`).join('');
  grid.querySelectorAll('.cat-chip').forEach(chip=>{
    chip.onclick = ()=>{
      const c = chip.dataset.cat;
      if(activeCats.has(c)){ activeCats.delete(c); chip.classList.add('off'); }
      else { activeCats.add(c); chip.classList.remove('off'); }
      applyFilter();
    };
  });
}

function applyFilter(){
  const term = searchTerm.trim().toLowerCase();
  const visibleMarkers = [];
  const visibleShops = [];
  DATA.forEach(shop=>{
    const ok = activeCats.has(shop.c) &&
      (term === '' || shop.n.toLowerCase().includes(term));
    if(ok){ visibleMarkers.push(shop._marker); visibleShops.push(shop); }
  });
  clusterer.clear();
  clusterer.addMarkers(visibleMarkers);
  document.getElementById('countLabel').textContent =
    `${visibleShops.length.toLocaleString()} / ${DATA.length.toLocaleString()}곳`;
  renderList(visibleShops);
}

function renderList(shops){
  const head = document.getElementById('listHead');
  const list = document.getElementById('list');
  head.textContent = `사용처 ${shops.length.toLocaleString()}곳`;
  if(shops.length === 0){
    list.innerHTML = '<div class="list-empty">조건에 맞는 사용처가 없습니다.</div>';
    return;
  }
  const shown = shops.slice(0, listLimit);
  list.innerHTML = shown.map((s,i)=>`
    <div class="list-item" data-i="${i}">
      <div class="name"><span class="dot" style="background:${colorOf(s.c)}"></span>${escapeHtml(s.n)}</div>
      <div class="meta">${escapeHtml(s.c)} · ${escapeHtml(s.a)}</div>
    </div>`).join('') +
    (shops.length > listLimit ? `<div class="list-more" id="loadMore">+ ${shops.length-listLimit}곳 더 보기</div>` : '');
  list.querySelectorAll('.list-item').forEach(el=>{
    el.onclick = ()=>{
      const s = shown[+el.dataset.i];
      map.setLevel(3);
      map.panTo(new kakao.maps.LatLng(s.la, s.lo));
      openInfo(s, s._marker);
      if(window.innerWidth <= 760) document.getElementById('panel').classList.add('hidden');
    };
  });
  const more = document.getElementById('loadMore');
  if(more) more.onclick = ()=>{ listLimit += 50; renderList(shops); };
}

function bindUI(){
  let t;
  document.getElementById('search').addEventListener('input', e=>{
    clearTimeout(t);
    t = setTimeout(()=>{ searchTerm = e.target.value; listLimit = 50; applyFilter(); }, 200);
  });
  document.getElementById('allOn').onclick = ()=>{
    activeCats = new Set(CATS);
    document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('off'));
    applyFilter();
  };
  document.getElementById('allOff').onclick = ()=>{
    activeCats = new Set();
    document.querySelectorAll('.cat-chip').forEach(c=>c.classList.add('off'));
    applyFilter();
  };
  document.getElementById('panelToggle').onclick = ()=>{
    document.getElementById('panel').classList.toggle('hidden');
  };
  document.getElementById('locBtn').onclick = locateMe;
}

let myMarker;
function locateMe(){
  if(!navigator.geolocation){ alert('위치 기능을 지원하지 않는 브라우저입니다.'); return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const loc = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
    if(myMarker) myMarker.setMap(null);
    const dot = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="7" fill="#1971c2" stroke="white" stroke-width="3"/></svg>`;
    const url = 'data:image/svg+xml;base64,'+btoa(dot);
    myMarker = new kakao.maps.Marker({
      position: loc, map: map,
      image: new kakao.maps.MarkerImage(url, new kakao.maps.Size(22,22), {offset:new kakao.maps.Point(11,11)})
    });
    map.setLevel(4);
    map.panTo(loc);
  }, ()=>alert('위치를 가져올 수 없습니다. 위치 권한을 확인해주세요.'), {enableHighAccuracy:true, timeout:8000});
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
</script>
</body>
</html>
